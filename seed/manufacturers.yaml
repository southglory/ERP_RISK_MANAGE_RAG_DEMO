# 벤더(제조사) 마스터 데이터
# 출처: 주요 벤더 공식 사이트 및 산업 보고서 기반 구축
# 후속 사용: Phase 1 카탈로그 시드 데이터, 리스크 탐지 시나리오 벤더 식별

# 필드:
